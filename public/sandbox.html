<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fff; font-family: sans-serif; }
    #container { width: 100%; min-height: 100vh; padding: 16px; }
  </style>
</head>
<body>
  <div id="container"></div>
  <script>
    (function () {
      'use strict';

      var currentExampleId = null;

      // Console interception
      var LEVELS = ['log', 'warn', 'error', 'info'];
      LEVELS.forEach(function (level) {
        var original = console[level].bind(console);
        console[level] = function () {
          original.apply(console, arguments);
          var args = Array.prototype.slice.call(arguments).map(function (a) {
            try { return JSON.stringify(a); } catch (_) { return String(a); }
          });
          window.parent.postMessage(
            { type: 'CONSOLE', exampleId: currentExampleId, level: level, args: args },
            '*'
          );
        };
      });

      // Sync error interception
      window.addEventListener('error', function (e) {
        window.parent.postMessage(
          { type: 'RUN_RESULT', exampleId: currentExampleId, status: 'fail', error: e.message || String(e) },
          '*'
        );
      });

      // Async error interception
      window.addEventListener('unhandledrejection', function (e) {
        var msg = e.reason && e.reason.message ? e.reason.message : String(e.reason || 'Unhandled rejection');
        window.parent.postMessage(
          { type: 'RUN_RESULT', exampleId: currentExampleId, status: 'fail', error: msg },
          '*'
        );
      });

      // Transform bare specifier imports to esm.sh CDN URLs
      // e.g. `import * as d3 from 'd3'` → `import * as d3 from 'https://esm.sh/d3'`
      function transformImports(code) {
        return code
          .replace(
            /from\s+['"](?!https?:\/\/|\.\/|\.\.\/)([\w@][^'"]*)['"]/g,
            "from 'https://esm.sh/$1'"
          )
          .replace(
            /^import\s+['"](?!https?:\/\/|\.\/|\.\.\/)([\w@][^'"]*)['"]/gm,
            "import 'https://esm.sh/$1'"
          );
      }

      // Reset the #container DOM between runs
      function resetContainer() {
        var old = document.getElementById('container');
        var fresh = document.createElement('div');
        fresh.id = 'container';
        fresh.style.cssText = 'width:100%;min-height:100vh;padding:16px;';
        if (old && old.parentNode) old.parentNode.replaceChild(fresh, old);
      }

      // Get the package name from a package.json string
      function getPackageName(packageJsonStr) {
        try { return JSON.parse(packageJsonStr).name || 'my-library'; }
        catch (_) { return 'my-library'; }
      }

      // Main run handler — async so we can await import()
      async function handleRunCode(data) {
        var exampleId = data.exampleId;
        var libraryCode = data.libraryCode;
        var exampleCode = data.exampleCode;
        var packageJsonStr = data.packageJson || '{"name":"my-library","version":"1.0.0"}';

        currentExampleId = exampleId;
        resetContainer();

        // 1. Transform bare imports in library → esm.sh URLs
        var transformed = transformImports(libraryCode);

        // 2. Load library as ES module via blob URL
        var libBlob = new Blob([transformed], { type: 'text/javascript' });
        var libUrl = URL.createObjectURL(libBlob);
        var libModule;
        try {
          libModule = await import(libUrl);
        } finally {
          URL.revokeObjectURL(libUrl);
        }

        // 3. Expose all named exports as globals so example code can use them directly
        Object.keys(libModule).forEach(function (key) {
          if (key !== 'default') window[key] = libModule[key];
        });
        // Also expose default export by its function/class name if it has one
        if (libModule.default && libModule.default.name) {
          window[libModule.default.name] = libModule.default;
        }

        // 4. Transform example code: resolve package name imports to globals
        //    e.g. `import { BarChart } from 'my-library'` → already-globals, just strip the import
        //    We handle this by replacing `from '<package-name>'` with a re-export from a virtual module
        //    Simpler: just strip those imports since all exports are already on window
        var pkgName = getPackageName(packageJsonStr);
        var pkgNameEscaped = pkgName.replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&');
        var transformedExample = exampleCode
          .replace(
            new RegExp("import\\s+\\{([^}]*)\\}\\s+from\\s+['\"]" + pkgNameEscaped + "['\"]", 'g'),
            function (_, imports) {
              // Convert `import { Foo, Bar } from 'pkg'` into `const { Foo, Bar } = window`
              // so the names are in scope (they're already on window from step 3)
              return 'const {' + imports + '} = window';
            }
          )
          .replace(
            new RegExp("import\\s+(\\w+)\\s+from\\s+['\"]" + pkgNameEscaped + "['\"]", 'g'),
            function (_, name) {
              return 'const ' + name + ' = window["' + name + '"]';
            }
          )
          .replace(
            new RegExp("import\\s+\\*\\s+as\\s+(\\w+)\\s+from\\s+['\"]" + pkgNameEscaped + "['\"]", 'g'),
            function (_, ns) {
              // namespace import — expose as object of all lib exports
              var keys = Object.keys(libModule).filter(function(k) { return k !== 'default'; });
              var entries = keys.map(function(k) { return '"' + k + '":window["' + k + '"]'; }).join(',');
              return 'const ' + ns + ' = {' + entries + '}';
            }
          );

        // 5. Run example code in async IIFE (top-level await supported)
        var exampleFn = new Function(
          'return (async function __specforge_example__() {\n' + transformedExample + '\n})()'
        );
        await exampleFn();
      }

      // Message receiver
      window.addEventListener('message', function (event) {
        if (!event.data || event.data.type !== 'RUN_CODE') return;

        var data = event.data;
        handleRunCode(data)
          .then(function () {
            window.parent.postMessage(
              { type: 'RUN_RESULT', exampleId: data.exampleId, status: 'pass', error: null },
              '*'
            );
          })
          .catch(function (err) {
            window.parent.postMessage(
              { type: 'RUN_RESULT', exampleId: data.exampleId, status: 'fail', error: err && err.message ? err.message : String(err) },
              '*'
            );
          });
      });
    })();
  </script>
</body>
</html>
